<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tengo una pregunta...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffeef2;
            font-family: sans-serif;
            overflow: hidden; /* Evita que salgan barras de scroll si el botón se aleja */
        }

        h1 {
            color: #d63384;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        .botones {
            display: flex;
            gap: 50px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: 0.1s; /* Movimiento rápido */
        }

        #btn-si {
            background-color: #4CAF50;
            color: white;
            z-index: 10;
        }

        #btn-no {
            background-color: #f44336;
            color: white;
            position: absolute; /* Importante para que se mueva por toda la pantalla */
        }

        .oculto {
            display: none;
        }

        #mensaje {
            text-align: center;
            color: #d63384;
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

    <div id="pantalla-principal">
        <h1>¿vamos a ser noviecitos y casarnos ? ❤️</h1>
        <div class="botones">
            <button id="btn-si">SÍ</button>
            <button id="btn-no">NO</button>
        </div>
    </div>

    <div id="mensaje" class="oculto">
        <h1>¡Sabía que dirías que sí! te tendre tus flores cuando vuelvas mi nico 🥰</h1>
        <p>Prepara tu mejor outfit, paso por ti.</p>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const principal = document.getElementById('pantalla-principal');
        const mensaje = document.getElementById('mensaje');

        // Función para mover el botón a una posición aleatoria
        const moverBoton = () => {
            // Calculamos el ancho y alto disponible restando el tamaño del botón
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.left = `${x}px`;
            btnNo.style.top = `${y}px`;
        };

        // Se mueve cuando el mouse pasa por encima
        btnNo.addEventListener('mouseenter', moverBoton);
        
        // También se mueve si intentan tocarlo en el celular
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Evita el click accidental
            moverBoton();
        });

        btnSi.addEventListener('click', () => {
            principal.classList.add('oculto');
            mensaje.classList.remove('oculto');
        });
    </script>
</body>
</html>
